name: Sync Issues with Linked PRs and User Project

on:
  schedule:
    - cron: '0 */1 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  repository-projects: read
  pull-requests: read

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Sync Issues, PR State, and Project Status
        uses: actions/github-script@v7
        env:
          USER_PROJECT_TOKEN: ${{ secrets.USER_PROJECT_TOKEN }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |

            const { Octokit } = require("@octokit/core");

            const ISSUE_OWNER = context.repo.owner;
            const ISSUE_REPO = context.repo.repo;
            const PROJECT_NUMBER = 3;

            // ✅ Secondary Octokit using PAT
            const userOctokit = new Octokit({
              auth: process.env.USER_PROJECT_TOKEN
            });

            console.log(`Repository: ${ISSUE_OWNER}/${ISSUE_REPO}`);

            // ✅ Resolve USER Project
            const projectData = await github.graphql(`
              query($login: String!, $number: Int!) {
                user(login: $login) {
                  projectV2(number: $number) {
                    id
                    fields(first: 50) {
                      nodes {
                        ... on ProjectV2SingleSelectField {
                          id
                          name
                          options {
                            id
                            name
                          }
                        }
                      }
                    }
                  }
                }
              }
            `, {
              login: ISSUE_OWNER,
              number: PROJECT_NUMBER
            });

            const project = projectData.user.projectV2;
            if (!project) return;

            const PROJECT_ID = project.id;

            const statusField = project.fields.nodes
              .filter(f => f && f.name)
              .find(f => f.name.trim().toLowerCase() === "status");

            if (!statusField) return;

            const STATUS_FIELD_ID = statusField.id;

            const IN_PROGRESS_OPTION_ID =
              statusField.options?.find(o =>
                o.name?.toLowerCase().includes("progress")
              )?.id;

            const IN_REVIEW_OPTION_ID =
              statusField.options?.find(o =>
                o.name?.toLowerCase().includes("review")
              )?.id;

            if (!IN_PROGRESS_OPTION_ID || !IN_REVIEW_OPTION_ID) return;

            // ✅ Fetch ALL project items (pagination)
            async function getAllProjectItems(projectId) {
              let hasNextPage = true;
              let endCursor = null;
              let allItems = [];

              while (hasNextPage) {
                const data = await github.graphql(`
                  query($projectId: ID!, $cursor: String) {
                    node(id: $projectId) {
                      ... on ProjectV2 {
                        items(first: 100, after: $cursor) {
                          pageInfo {
                            hasNextPage
                            endCursor
                          }
                          nodes {
                            id
                            content {
                              ... on Issue { id }
                            }
                          }
                        }
                      }
                    }
                  }
                `, { projectId, cursor: endCursor });

                const items = data.node.items;
                allItems.push(...items.nodes);
                hasNextPage = items.pageInfo.hasNextPage;
                endCursor = items.pageInfo.endCursor;
              }

              return allItems;
            }

            const projectItems = await getAllProjectItems(PROJECT_ID);

            const issues = await github.paginate(
              github.rest.issues.listForRepo,
              {
                owner: ISSUE_OWNER,
                repo: ISSUE_REPO,
                state: "open",
              }
            );

            for (const issue of issues) {

              const timeline = await github.paginate(
                github.rest.issues.listEventsForTimeline,
                {
                  owner: ISSUE_OWNER,
                  repo: ISSUE_REPO,
                  issue_number: issue.number,
                  mediaType: { previews: ["mockingbird"] }
                }
              );

              for (const event of timeline) {

                if (event.event === "cross-referenced" && event.source?.issue?.pull_request) {

                  const pr = event.source.issue;

                  let prData;

                  try {
                    const result = await github.request(
                      "GET /repos/{owner}/{repo}/pulls/{pull_number}",
                      {
                        owner: pr.repository.owner.login,
                        repo: pr.repository.name,
                        pull_number: pr.number,
                      }
                    );
                    prData = result.data;
                  } catch {
                    continue;
                  }

                  if (prData.merged) {
                    await github.rest.issues.update({
                      owner: ISSUE_OWNER,
                      repo: ISSUE_REPO,
                      issue_number: issue.number,
                      state: "closed",
                    });
                    break;
                  }

                  const targetOptionId =
                    prData.draft
                      ? IN_PROGRESS_OPTION_ID
                      : IN_REVIEW_OPTION_ID;

                  const projectItem =
                    projectItems.find(
                      item => item.content?.id === issue.node_id
                    );

                  if (!projectItem) continue;

                  // ✅ TRUE PAT mutation (this is the fix)
                  await userOctokit.graphql(`
                    mutation($projectId:ID!, $itemId:ID!, $fieldId:ID!, $optionId:String!) {
                      updateProjectV2ItemFieldValue(
                        input:{
                          projectId:$projectId
                          itemId:$itemId
                          fieldId:$fieldId
                          value:{ singleSelectOptionId:$optionId }
                        }
                      ) {
                        projectV2Item { id }
                      }
                    }
                  `, {
                    projectId: PROJECT_ID,
                    itemId: projectItem.id,
                    fieldId: STATUS_FIELD_ID,
                    optionId: targetOptionId
                  });

                  console.log(`✅ Updated status for issue #${issue.number}`);
                }
              }
            }
