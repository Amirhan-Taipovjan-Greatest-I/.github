name: Sync Issues with Linked PRs and User Project

on:
  schedule:
    - cron: '0 */1 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  repository-projects: write
  pull-requests: read

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Sync Issues, PR State, and Project Status
        uses: actions/github-script@v7
        with:
          script: |

            const ISSUE_OWNER = context.repo.owner;
            const ISSUE_REPO = context.repo.repo;
            const PROJECT_NUMBER = 3;

            console.log(`Repository: ${ISSUE_OWNER}/${ISSUE_REPO}`);

            // ✅ Resolve USER Project
            const projectData = await github.graphql(`
              query($login: String!, $number: Int!) {
                user(login: $login) {
                  projectV2(number: $number) {
                    id
                    fields(first: 20) {
                      nodes {
                        ... on ProjectV2SingleSelectField {
                          id
                          name
                          options {
                            id
                            name
                          }
                        }
                      }
                    }
                  }
                }
              }
            `, {
              login: ISSUE_OWNER,
              number: PROJECT_NUMBER
            });

            const project = projectData.user.projectV2;

            if (!project) {
              console.log("User project not found.");
              return;
            }

            const PROJECT_ID = project.id;

            const statusField = project.fields.nodes.find(f => f.name === "Status");

            if (!statusField) {
              console.log("Status field not found.");
              return;
            }

            const STATUS_FIELD_ID = statusField.id;

            const IN_PROGRESS_OPTION_ID =
              statusField.options.find(o => o.name === "In Progress")?.id;

            const IN_REVIEW_OPTION_ID =
              statusField.options.find(o => o.name === "In Review")?.id;

            if (!IN_PROGRESS_OPTION_ID || !IN_REVIEW_OPTION_ID) {
              console.log("Required status options not found.");
              return;
            }

            console.log("✅ User Project resolved successfully.");

            // ✅ Get open issues
            const issues = await github.paginate(
              github.rest.issues.listForRepo,
              {
                owner: ISSUE_OWNER,
                repo: ISSUE_REPO,
                state: "open",
              }
            );

            console.log(`Found ${issues.length} open issues`);

            for (const issue of issues) {

              console.log(`\nChecking issue #${issue.number}`);

              const timeline = await github.paginate(
                github.rest.issues.listEventsForTimeline,
                {
                  owner: ISSUE_OWNER,
                  repo: ISSUE_REPO,
                  issue_number: issue.number,
                  mediaType: { previews: ["mockingbird"] }
                }
              );

              for (const event of timeline) {

                if (event.event === "cross-referenced" && event.source?.issue?.pull_request) {

                  const pr = event.source.issue;
                  const prOwner = pr.repository.owner.login;
                  const prRepo = pr.repository.name;
                  const prNumber = pr.number;

                  console.log(`Linked PR: ${prOwner}/${prRepo}#${prNumber}`);

                  let prData;

                  try {
                    const result = await github.request(
                      "GET /repos/{owner}/{repo}/pulls/{pull_number}",
                      {
                        owner: prOwner,
                        repo: prRepo,
                        pull_number: prNumber,
                      }
                    );

                    prData = result.data;

                  } catch (error) {
                    console.log("Cannot access PR.");
                    continue;
                  }

                  console.log(`PR state: ${prData.state}, draft: ${prData.draft}, merged: ${prData.merged}`);

                  // ✅ Close issue if merged
                  if (prData.merged) {

                    await github.rest.issues.update({
                      owner: ISSUE_OWNER,
                      repo: ISSUE_REPO,
                      issue_number: issue.number,
                      state: "closed",
                    });

                    console.log(`✅ Closed issue #${issue.number}`);
                    break;
                  }

                  // ✅ Determine correct status
                  const targetOptionId =
                    prData.draft
                      ? IN_PROGRESS_OPTION_ID
                      : IN_REVIEW_OPTION_ID;

                  // ✅ Get Project Item
                  const itemData = await github.graphql(`
                    query($owner:String!, $repo:String!, $number:Int!) {
                      repository(owner:$owner, name:$repo) {
                        issue(number:$number) {
                          projectItems(first:20) {
                            nodes {
                              id
                              project { id }
                            }
                          }
                        }
                      }
                    }
                  `, {
                    owner: ISSUE_OWNER,
                    repo: ISSUE_REPO,
                    number: issue.number
                  });

                  const projectItem = itemData.repository.issue.projectItems.nodes
                    .find(i => i.project.id === PROJECT_ID);

                  if (!projectItem) {
                    console.log("Issue not in user project.");
                    continue;
                  }

                  await github.graphql(`
                    mutation($projectId:ID!, $itemId:ID!, $fieldId:ID!, $optionId:String!) {
                      updateProjectV2ItemFieldValue(
                        input:{
                          projectId:$projectId
                          itemId:$itemId
                          fieldId:$fieldId
                          value:{ singleSelectOptionId:$optionId }
                        }
                      ) {
                        projectV2Item { id }
                      }
                    }
                  `, {
                    projectId: PROJECT_ID,
                    itemId: projectItem.id,
                    fieldId: STATUS_FIELD_ID,
                    optionId: targetOptionId
                  });

                  console.log(`✅ Updated project status for issue #${issue.number}`);
                }
              }
            }
