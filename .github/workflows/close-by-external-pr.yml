name: Close issues when external PRs close

on:
  schedule:
    - cron: '0 */1 * * *'  # every 1 hour
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  check-prs:
    runs-on: ubuntu-latest
    steps:
      - name: Close issues with closed external PRs
        uses: actions/github-script@v7
        with:
          script: |
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
            });

            const prPattern = /https:\/\/github\.com\/([^/]+)\/([^/]+)\/pull\/(\d+)/g;

            for (const issue of issues) {
              const body = issue.body || '';
              let match;

              while ((match = prPattern.exec(body)) !== null) {
                const [, prOwner, prRepo, prNumber] = match;

                try {
                  const response = await fetch(
                    `https://api.github.com/repos/${prOwner}/${prRepo}/pulls/${prNumber}`
                  );

                  if (!response.ok) {
                    console.log(`Cannot access ${prOwner}/${prRepo}#${prNumber}`);
                    continue;
                  }

                  const pr = await response.json();

                  if (pr.merged === true) {
                    await github.rest.issues.update({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      issue_number: issue.number,
                      state: 'closed',
                    });

                    console.log(`Closed issue #${issue.number}`);
                    break;
                  }

                } catch (e) {
                  console.log(`Error checking ${prOwner}/${prRepo}#${prNumber}`);
                  console.log(e.message);
                }
              }
            }
