name: Syncing Issues with Linked PRs and User Project

on:
  issues:
    types: [opened, edited, milestoned, demilestoned]
  issue_comment:
    types: [created, edited]
  schedule:
    - cron: '0 */1 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: read
  repository-projects: read

concurrency:
  group: sync-issues-project
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Syncing Issue Statuses with linked PR Statuses
        uses: actions/github-script@v7
        env:
          USER_PROJECT_TOKEN: ${{ secrets.USER_PROJECT_TOKEN }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const ISSUE_OWNER = context.repo.owner;
            const ISSUE_REPO  = context.repo.repo;

            // User Project config
            const PROJECT_NUMBER = 3;

            // Status option names in your Project (edit if yours differ)
            const STATUS_IN_PROGRESS_NAME = "In Progress";
            const STATUS_IN_REVIEW_NAME   = "In Review";

            const norm = (s) => (s ?? "").trim().toLowerCase();

            // PAT-authenticated Octokit for USER Project read/write
            const userOctokit = new github.constructor({
              auth: process.env.USER_PROJECT_TOKEN
            });

            console.log(`Event: ${context.eventName}`);
            console.log(`Repo: ${ISSUE_OWNER}/${ISSUE_REPO}`);

            // ----------------------------
            // Resolve USER project + Status field/options (via PAT)
            // ----------------------------
            const projectData = await userOctokit.graphql(`
              query($login: String!, $number: Int!) {
                user(login: $login) {
                  projectV2(number: $number) {
                    id
                    fields(first: 100) {
                      nodes {
                        ... on ProjectV2SingleSelectField {
                          id
                          name
                          options { id name }
                        }
                      }
                    }
                  }
                }
              }
            `, { login: ISSUE_OWNER, number: PROJECT_NUMBER });

            const project = projectData?.user?.projectV2;
            if (!project) {
              throw new Error(`User project #${PROJECT_NUMBER} not found under user ${ISSUE_OWNER}`);
            }

            const PROJECT_ID = project.id;

            const statusField = (project.fields.nodes || [])
              .find(f => norm(f?.name) === "status");

            if (!statusField) {
              throw new Error(`Status field not found in user project #${PROJECT_NUMBER}`);
            }

            const STATUS_FIELD_ID = statusField.id;

            const inProgressOpt = (statusField.options || [])
              .find(o => norm(o.name) === norm(STATUS_IN_PROGRESS_NAME));

            const inReviewOpt = (statusField.options || [])
              .find(o => norm(o.name) === norm(STATUS_IN_REVIEW_NAME));

            if (!inProgressOpt || !inReviewOpt) {
              console.log("Available Status options:");
              for (const o of (statusField.options || [])) console.log(`- ${o.name} (${o.id})`);
              throw new Error(`Could not find Status options "${STATUS_IN_PROGRESS_NAME}" and/or "${STATUS_IN_REVIEW_NAME}"`);
            }

            const IN_PROGRESS_OPTION_ID = inProgressOpt.id;
            const IN_REVIEW_OPTION_ID   = inReviewOpt.id;

            console.log(`Project resolved. PROJECT_ID=${PROJECT_ID}`);
            console.log(`Status field resolved. STATUS_FIELD_ID=${STATUS_FIELD_ID}`);
            console.log(`In Progress option id: ${IN_PROGRESS_OPTION_ID}`);
            console.log(`In Review option id:   ${IN_REVIEW_OPTION_ID}`);

            // ----------------------------
            // Determine issues to process (event targeting)
            // ----------------------------
            let issuesToProcess = [];

            if (context.eventName === "issues" || context.eventName === "issue_comment") {
              const issueNumber = context.payload.issue.number;
              const { data: issue } = await github.rest.issues.get({
                owner: ISSUE_OWNER,
                repo: ISSUE_REPO,
                issue_number: issueNumber,
              });

              // Skip PRs masquerading as issues
              if (issue.pull_request) {
                console.log(`Skipping #${issue.number} (it is a PR, not an issue)`);
                return;
              }

              if (issue.state === "open") {
                issuesToProcess = [issue];
              } else {
                console.log(`Skipping #${issue.number} (not open)`);
                return;
              }
            } else {
              issuesToProcess = await github.paginate(
                github.rest.issues.listForRepo,
                { owner: ISSUE_OWNER, repo: ISSUE_REPO, state: "open" }
              );
              // Filter out PRs
              issuesToProcess = issuesToProcess.filter(i => !i.pull_request);
            }

            console.log(`Issues to process: ${issuesToProcess.length}`);

            // ----------------------------
            // Helper: fetch ALL linked PR identifiers via paginated timelineItems
            // (GraphQL timelineItems is used ONLY to discover PR number+repo)
            // ----------------------------
            async function getLinkedPRIdentifiers(issueNumber) {
              let hasNextPage = true;
              let endCursor = null;
              const prs = [];

              while (hasNextPage) {
                const page = await github.graphql(`
                  query($owner:String!, $repo:String!, $number:Int!, $cursor:String) {
                    repository(owner:$owner, name:$repo) {
                      issue(number:$number) {
                        timelineItems(
                          first: 50,
                          after: $cursor,
                          itemTypes: [CROSS_REFERENCED_EVENT, CONNECTED_EVENT]
                        ) {
                          pageInfo { hasNextPage endCursor }
                          nodes {
                            ... on CrossReferencedEvent {
                              source {
                                ... on PullRequest {
                                  number
                                  repository { name owner { login } }
                                }
                              }
                            }
                            ... on ConnectedEvent {
                              subject {
                                ... on PullRequest {
                                  number
                                  repository { name owner { login } }
                                }
                              }
                            }
                          }
                        }
                      }
                    }
                  }
                `, {
                  owner: ISSUE_OWNER,
                  repo: ISSUE_REPO,
                  number: issueNumber,
                  cursor: endCursor
                });

                const items = page?.repository?.issue?.timelineItems;
                const nodes = items?.nodes || [];

                for (const n of nodes) {
                  const pr = n.source || n.subject;
                  if (pr?.repository?.owner?.login && pr?.repository?.name && pr?.number) {
                    prs.push({
                      owner: pr.repository.owner.login,
                      repo: pr.repository.name,
                      number: pr.number
                    });
                  }
                }

                hasNextPage = !!items?.pageInfo?.hasNextPage;
                endCursor = items?.pageInfo?.endCursor || null;
              }

              // Deduplicate by owner/repo/number
              const uniq = new Map();
              for (const pr of prs) uniq.set(`${pr.owner}/${pr.repo}#${pr.number}`, pr);
              return [...uniq.values()];
            }

            // ----------------------------
            // Main loop
            // ----------------------------
            for (const issue of issuesToProcess) {
              console.log(`\nChecking issue #${issue.number}`);

              const linked = await getLinkedPRIdentifiers(issue.number);
              if (linked.length === 0) {
                console.log("No linked PRs found.");
                continue;
              }

              // Fetch live PR states via REST (works cross-repo)
              let allMerged = true;
              let anyDraft = false;

              for (const pr of linked) {
                try {
                  const { data: prData } = await github.request(
                    "GET /repos/{owner}/{repo}/pulls/{pull_number}",
                    { owner: pr.owner, repo: pr.repo, pull_number: pr.number }
                  );

                  console.log(`PR ${pr.owner}/${pr.repo}#${pr.number} | merged=${prData.merged} | draft=${prData.draft}`);

                  if (!prData.merged) allMerged = false;
                  if (prData.draft) anyDraft = true;
                } catch (e) {
                  // If we cannot read one PR, do NOT close issue.
                  console.log(`PR fetch failed for ${pr.owner}/${pr.repo}#${pr.number}: ${e.message}`);
                  allMerged = false;
                }
              }

              // Close only if ALL PRs merged
              if (allMerged) {
                await github.rest.issues.update({
                  owner: ISSUE_OWNER,
                  repo: ISSUE_REPO,
                  issue_number: issue.number,
                  state: "closed",
                });
                console.log(`Closed issue #${issue.number} (all linked PRs merged)`);
                continue;
              }

              // Find this issue's project item in the USER project (via PAT)
              const projectItemData = await userOctokit.graphql(`
                query($owner:String!, $repo:String!, $number:Int!) {
                  repository(owner:$owner, name:$repo) {
                    issue(number:$number) {
                      projectItems(first: 50) {
                        nodes {
                          id
                          project { id }
                        }
                      }
                    }
                  }
                }
              `, { owner: ISSUE_OWNER, repo: ISSUE_REPO, number: issue.number });

              const projectItem = projectItemData.repository.issue.projectItems.nodes
                .find(n => n.project.id === PROJECT_ID);

              if (!projectItem) {
                console.log("Issue not in the target user project. Skipping project status sync.");
                continue;
              }

              // Read current status optionId (via PAT)
              const statusData = await userOctokit.graphql(`
                query($itemId: ID!) {
                  node(id: $itemId) {
                    ... on ProjectV2Item {
                      fieldValues(first: 50) {
                        nodes {
                          ... on ProjectV2ItemFieldSingleSelectValue {
                            field { ... on ProjectV2SingleSelectField { id } }
                            optionId
                          }
                        }
                      }
                    }
                  }
                }
              `, { itemId: projectItem.id });

              const currentStatusValue = statusData.node.fieldValues.nodes
                .find(v => v.field?.id === STATUS_FIELD_ID);

              const currentStatusOptionId = currentStatusValue?.optionId || null;

              // ID-based state machine:
              // - anyDraft: downgrade Review -> Progress
              // - noDrafts: promote anything -> Review
              let targetOptionId = null;

              if (anyDraft) {
                if (currentStatusOptionId === IN_REVIEW_OPTION_ID) {
                  targetOptionId = IN_PROGRESS_OPTION_ID;
                }
              } else {
                if (currentStatusOptionId !== IN_REVIEW_OPTION_ID) {
                  targetOptionId = IN_REVIEW_OPTION_ID;
                }
              }

              if (!targetOptionId) {
                console.log("No project status change needed.");
                continue;
              }

              if (currentStatusOptionId === targetOptionId) {
                console.log("Already in desired status.");
                continue;
              }

              // Update status (via PAT)
              await userOctokit.graphql(`
                mutation($projectId:ID!, $itemId:ID!, $fieldId:ID!, $optionId:String!) {
                  updateProjectV2ItemFieldValue(
                    input:{
                      projectId:$projectId
                      itemId:$itemId
                      fieldId:$fieldId
                      value:{ singleSelectOptionId:$optionId }
                    }
                  ) {
                    projectV2Item { id }
                  }
                }
              `, {
                projectId: PROJECT_ID,
                itemId: projectItem.id,
                fieldId: STATUS_FIELD_ID,
                optionId: targetOptionId
              });

              console.log(`Updated project status for issue #${issue.number}`);
            }
            console.log("\nSync complete.");
