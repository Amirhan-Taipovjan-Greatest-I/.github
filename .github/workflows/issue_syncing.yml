# Was written by 'the Dark Side' and was Idea-Leaded by Me.
name: Syncing Issues with Linked PRs and User Project

on:
  issues: # The Secondary Event that is needed for a Defined GitHub Action.
    types: [opened, edited, milestoned, demilestoned]
  issue_comment: # The Secondary Event that is needed for a Defined GitHub Action. Especially I like commenting on Issues, etc.
    types: [created, edited]
  schedule: # The Main Event, do not touch.
    - cron: '0 */1 * * *' # Change the "1" to any number of Hours... updates every "x" Hours.
  workflow_dispatch:

permissions: # Permissions for GITHUB_TOKEN that generates every Time a GitHub Action runs.
  contents: read
  issues: write
  repository-projects: read
  pull-requests: read

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Syncing Issue Statuses with linked PR Statuses + Issues'' Project Statuses depending on PR States.
        uses: actions/github-script@v7
        env:
          USER_PROJECT_TOKEN: ${{ secrets.USER_PROJECT_TOKEN }} # Add the 'USER_PROJECT_TOKEN' Repository Secret in a Repo Settings.
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |

            const ISSUE_OWNER = context.repo.owner;
            const ISSUE_REPO = context.repo.repo;
            const PROJECT_NUMBER = 3;

            // ✅ Secondary authenticated client (PAT)
            const userOctokit = new github.constructor({
              auth: process.env.USER_PROJECT_TOKEN //This Token is a Classic PAT with full Project Permissions only.
            });

            console.log(`Repository: ${ISSUE_OWNER}/${ISSUE_REPO}`);

            // ✅ Resolve USER Project
            const projectData = await github.graphql(`
              query($login: String!, $number: Int!) {
                user(login: $login) {
                  projectV2(number: $number) {
                    id
                    fields(first: 50) {
                      nodes {
                        ... on ProjectV2SingleSelectField {
                          id
                          name
                          options { id name }
                        }
                      }
                    }
                  }
                }
              }
            `, {
              login: ISSUE_OWNER,
              number: PROJECT_NUMBER
            });

            const project = projectData.user.projectV2;
            if (!project) return;

            const PROJECT_ID = project.id;

            const statusField = project.fields.nodes
              .filter(f => f && f.name)
              .find(f => f.name.trim().toLowerCase() === "status");

            if (!statusField) return;

            const STATUS_FIELD_ID = statusField.id;

            const IN_PROGRESS_OPTION_ID =
              statusField.options?.find(o =>
                o.name?.toLowerCase().includes("progress")
              )?.id;

            const IN_REVIEW_OPTION_ID =
              statusField.options?.find(o =>
                o.name?.toLowerCase().includes("review")
              )?.id;

            if (!IN_PROGRESS_OPTION_ID || !IN_REVIEW_OPTION_ID) return;

            // ✅ Pagination for unlimited project size
            async function getAllProjectItems(projectId) {
              let hasNextPage = true;
              let endCursor = null;
              let allItems = [];

              while (hasNextPage) {
                const data = await github.graphql(`
                  query($projectId: ID!, $cursor: String) {
                    node(id: $projectId) {
                      ... on ProjectV2 {
                        items(first: 100, after: $cursor) {
                          pageInfo { hasNextPage endCursor }
                          nodes {
                            id
                            content { ... on Issue { id } }
                          }
                        }
                      }
                    }
                  }
                `, { projectId, cursor: endCursor });

                const items = data.node.items;
                allItems.push(...items.nodes);

                hasNextPage = items.pageInfo.hasNextPage;
                endCursor = items.pageInfo.endCursor;
              }

              return allItems;
            }

            const projectItems = await getAllProjectItems(PROJECT_ID);

            // ✅ DUAL-MODE TARGETING ENGINE
            let issuesToProcess = [];

            if (context.eventName === 'issues' || context.eventName === 'issue_comment') {
              // ⚡ Event-Driven Mode: Target ONLY the issue that changed
              const targetIssueNumber = context.payload.issue.number;
              console.log(`⚡ Instant Sync triggered by event on Issue #${targetIssueNumber}`);
              
              try {
                const { data: freshIssue } = await github.rest.issues.get({
                  owner: ISSUE_OWNER,
                  repo: ISSUE_REPO,
                  issue_number: targetIssueNumber
                });
                if (freshIssue.state === 'open') {
                  issuesToProcess.push(freshIssue);
                }
              } catch (e) {
                console.log(`Failed to fetch fresh data for issue #${targetIssueNumber}: ${e.message}`);
              }
            } else {
              // ⏰ Fallback Polling Mode: Sync all open issues
              console.log("⏰ Fallback Sync triggered by Schedule or Dispatch. Processing all open issues...");
              issuesToProcess = await github.paginate(
                github.rest.issues.listForRepo,
                {
                  owner: ISSUE_OWNER,
                  repo: ISSUE_REPO,
                  state: "open",
                }
              );
            }

            console.log(`Processing execution for ${issuesToProcess.length} issue(s).`);

            for (const issue of issuesToProcess) {

              console.log(`Checking issue #${issue.number}`);

              const timeline = await github.paginate(
                github.rest.issues.listEventsForTimeline,
                {
                  owner: ISSUE_OWNER,
                  repo: ISSUE_REPO,
                  issue_number: issue.number,
                  mediaType: { previews: ["mockingbird"] }
                }
              );

              // ✅ Collect ALL linked PRs
              const linkedPRs = timeline
                .filter(e => e.event === "cross-referenced" && e.source?.issue?.pull_request)
                .map(e => e.source.issue);

              if (linkedPRs.length === 0) continue;

              let allMerged = true;
              let anyDraft = false;

              for (const pr of linkedPRs) {
                let prData;
                try {
                  const result = await github.request(
                    "GET /repos/{owner}/{repo}/pulls/{pull_number}",
                    {
                      owner: pr.repository.owner.login,
                      repo: pr.repository.name,
                      pull_number: pr.number,
                    }
                  );
                  prData = result.data;
                } catch {
                  continue;
                }

                if (!prData.merged) {
                  allMerged = false;
                  if (prData.draft) {
                    anyDraft = true;
                  }
                }
              }

              // ✅ Close only if ALL PRs merged
              if (allMerged) {
                await github.rest.issues.update({
                  owner: ISSUE_OWNER,
                  repo: ISSUE_REPO,
                  issue_number: issue.number,
                  state: "closed",
                });
                console.log(`✅ Closed issue #${issue.number}`);
                continue;
              }

              const projectItem =
                projectItems.find(
                  item => item.content?.id === issue.node_id
                );

              if (!projectItem) continue;

              // ✅ Get current status
              const itemData = await github.graphql(`
                query($itemId: ID!) {
                  node(id: $itemId) {
                    ... on ProjectV2Item {
                      fieldValues(first: 20) {
                        nodes {
                          ... on ProjectV2ItemFieldSingleSelectValue {
                            field { ... on ProjectV2SingleSelectField { id } }
                            name
                            optionId
                          }
                        }
                      }
                    }
                  }
                }
              `, { itemId: projectItem.id });

              const currentStatusValue = itemData.node.fieldValues.nodes
                .find(v => v.field?.id === STATUS_FIELD_ID);

              const currentStatusOptionId = currentStatusValue?.optionId;
              const currentStatusName = currentStatusValue?.name?.toLowerCase();

              let targetOptionId = null;

              // ✅ STATE MACHINE
              if (anyDraft) {
                if (currentStatusName === "In Review") {
                  targetOptionId = IN_PROGRESS_OPTION_ID;
                }
              } else {
                if (currentStatusName !== "In Review") {
                  targetOptionId = IN_REVIEW_OPTION_ID;
                }
              }

              if (!targetOptionId) continue;
              if (currentStatusOptionId === targetOptionId) continue;

              // ✅ Update via PAT
              await userOctokit.graphql(`
                mutation($projectId:ID!, $itemId:ID!, $fieldId:ID!, $optionId:String!) {
                  updateProjectV2ItemFieldValue(
                    input:{
                      projectId:$projectId
                      itemId:$itemId
                      fieldId:$fieldId
                      value:{ singleSelectOptionId:$optionId }
                    }
                  ) {
                    projectV2Item { id }
                  }
                }
              `, {
                projectId: PROJECT_ID,
                itemId: projectItem.id,
                fieldId: STATUS_FIELD_ID,
                optionId: targetOptionId
              });

              console.log(`✅ Updated status for issue #${issue.number}`);
            }
