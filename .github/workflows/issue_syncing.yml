name: Syncing Issues with Linked PRs and User Project

on:
  issues:
    types: [opened, edited, milestoned, demilestoned]
  issue_comment:
    types: [created, edited]
  schedule:
    - cron: '0 */1 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  repository-projects: read
  pull-requests: read

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Syncing Issue Statuses with linked PR Statuses
        uses: actions/github-script@v7
        env:
          USER_PROJECT_TOKEN: ${{ secrets.USER_PROJECT_TOKEN }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |

            const ISSUE_OWNER = context.repo.owner;
            const ISSUE_REPO = context.repo.repo;
            const PROJECT_NUMBER = 3;

            const userOctokit = new github.constructor({
              auth: process.env.USER_PROJECT_TOKEN
            });

            // ✅ Resolve USER Project
            const projectData = await github.graphql(`
              query($login: String!, $number: Int!) {
                user(login: $login) {
                  projectV2(number: $number) {
                    id
                    fields(first: 50) {
                      nodes {
                        ... on ProjectV2SingleSelectField {
                          id
                          name
                          options { id name }
                        }
                      }
                    }
                  }
                }
              }
            `, {
              login: ISSUE_OWNER,
              number: PROJECT_NUMBER
            });

            const project = projectData.user.projectV2;
            if (!project) return;

            const PROJECT_ID = project.id;

            const statusField = project.fields.nodes
              .find(f => f.name?.toLowerCase() === "status");

            if (!statusField) return;

            const STATUS_FIELD_ID = statusField.id;

            const IN_PROGRESS_OPTION_ID =
              statusField.options?.find(o =>
                o.name?.toLowerCase().includes("progress")
              )?.id;

            const IN_REVIEW_OPTION_ID =
              statusField.options?.find(o =>
                o.name?.toLowerCase().includes("review")
              )?.id;

            if (!IN_PROGRESS_OPTION_ID || !IN_REVIEW_OPTION_ID) return;

            // ✅ Event-aware targeting
            let issuesToProcess = [];

            if (context.eventName === 'issues' || context.eventName === 'issue_comment') {
              const { data: freshIssue } = await github.rest.issues.get({
                owner: ISSUE_OWNER,
                repo: ISSUE_REPO,
                issue_number: context.payload.issue.number
              });

              if (freshIssue.state === 'open') {
                issuesToProcess.push(freshIssue);
              }
            } else {
              issuesToProcess = await github.paginate(
                github.rest.issues.listForRepo,
                {
                  owner: ISSUE_OWNER,
                  repo: ISSUE_REPO,
                  state: "open",
                }
              );
            }

            for (const issue of issuesToProcess) {

              console.log(`Checking issue #${issue.number}`);

              const timeline = await github.paginate(
                github.rest.issues.listEventsForTimeline,
                {
                  owner: ISSUE_OWNER,
                  repo: ISSUE_REPO,
                  issue_number: issue.number,
                  mediaType: { previews: ["mockingbird"] }
                }
              );

              // ✅ Deduplicated PR detection
              const linkedPRs = [
                ...new Map(
                  timeline
                    .filter(e => e.source?.issue?.pull_request)
                    .map(e => {
                      const pr = e.source.issue;
                      return [`${pr.repository.owner.login}/${pr.repository.name}#${pr.number}`, pr];
                    })
                ).values()
              ];

              if (linkedPRs.length === 0) continue;

              let allMerged = true;
              let anyDraft = false;

              for (const pr of linkedPRs) {

                const result = await github.request(
                  "GET /repos/{owner}/{repo}/pulls/{pull_number}",
                  {
                    owner: pr.repository.owner.login,
                    repo: pr.repository.name,
                    pull_number: pr.number,
                  }
                );

                const prData = result.data;

                console.log(
                  `PR ${pr.repository.owner.login}/${pr.repository.name}#${pr.number} | merged=${prData.merged} | draft=${prData.draft}`
                );

                if (!prData.merged) allMerged = false;
                if (prData.draft) anyDraft = true;
              }

              if (allMerged) {
                await github.rest.issues.update({
                  owner: ISSUE_OWNER,
                  repo: ISSUE_REPO,
                  issue_number: issue.number,
                  state: "closed",
                });
                console.log(`Closed issue #${issue.number}`);
                continue;
              }

              const itemData = await github.graphql(`
                query($owner:String!, $repo:String!, $number:Int!) {
                  repository(owner:$owner, name:$repo) {
                    issue(number:$number) {
                      projectItems(first:20) {
                        nodes {
                          id
                          project { id }
                        }
                      }
                    }
                  }
                }
              `, {
                owner: ISSUE_OWNER,
                repo: ISSUE_REPO,
                number: issue.number
              });

              const projectItem = itemData.repository.issue.projectItems.nodes
                .find(p => p.project.id === PROJECT_ID);

              if (!projectItem) continue;

              const statusData = await github.graphql(`
                query($itemId: ID!) {
                  node(id: $itemId) {
                    ... on ProjectV2Item {
                      fieldValues(first: 20) {
                        nodes {
                          ... on ProjectV2ItemFieldSingleSelectValue {
                            field { ... on ProjectV2SingleSelectField { id } }
                            name
                            optionId
                          }
                        }
                      }
                    }
                  }
                }
              `, { itemId: projectItem.id });

              const currentStatusValue = statusData.node.fieldValues.nodes
                .find(v => v.field?.id === STATUS_FIELD_ID);

              const currentStatusName =
                currentStatusValue?.name?.toLowerCase() || "";

              let targetOptionId = null;

              if (anyDraft) {
                if (currentStatusName === "in review") {
                  targetOptionId = IN_PROGRESS_OPTION_ID;
                }
              } else {
                if (currentStatusName !== "in review") {
                  targetOptionId = IN_REVIEW_OPTION_ID;
                }
              }

              if (!targetOptionId) continue;
              if (currentStatusValue?.optionId === targetOptionId) continue;

              await userOctokit.graphql(`
                mutation($projectId:ID!, $itemId:ID!, $fieldId:ID!, $optionId:String!) {
                  updateProjectV2ItemFieldValue(
                    input:{
                      projectId:$projectId
                      itemId:$itemId
                      fieldId:$fieldId
                      value:{ singleSelectOptionId:$optionId }
                    }
                  ) {
                    projectV2Item { id }
                  }
                }
              `, {
                projectId: PROJECT_ID,
                itemId: projectItem.id,
                fieldId: STATUS_FIELD_ID,
                optionId: targetOptionId
              });

              console.log(`Updated status for issue #${issue.number}`);
            }name: Syncing Issues with Linked PRs and User Project

on:
  schedule:
    - cron: '0 */1 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  repository-projects: read
  pull-requests: read

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Syncing Issue Statuses with linked PR Statuses
        uses: actions/github-script@v7
        env:
          USER_PROJECT_TOKEN: ${{ secrets.USER_PROJECT_TOKEN }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |

            const ISSUE_OWNER = context.repo.owner;
            const ISSUE_REPO = context.repo.repo;
            const PROJECT_NUMBER = 3;

            const userOctokit = new github.constructor({
              auth: process.env.USER_PROJECT_TOKEN
            });

            console.log(`Event name: ${context.eventName}`);

            // ✅ Resolve project
            const projectData = await github.graphql(`
              query($login: String!, $number: Int!) {
                user(login: $login) {
                  projectV2(number: $number) {
                    id
                    fields(first: 50) {
                      nodes {
                        ... on ProjectV2SingleSelectField {
                          id
                          name
                          options { id name }
                        }
                      }
                    }
                  }
                }
              }
            `, {
              login: ISSUE_OWNER,
              number: PROJECT_NUMBER
            });

            const project = projectData.user.projectV2;
            if (!project) {
              console.log("Project not found");
              return;
            }

            const PROJECT_ID = project.id;

            const statusField = project.fields.nodes
              .find(f => f.name?.toLowerCase() === "status");

            if (!statusField) {
              console.log("Status field not found");
              return;
            }

            const STATUS_FIELD_ID = statusField.id;

            const IN_PROGRESS_OPTION_ID =
              statusField.options?.find(o =>
                o.name?.toLowerCase().includes("progress")
              )?.id;

            const IN_REVIEW_OPTION_ID =
              statusField.options?.find(o =>
                o.name?.toLowerCase().includes("review")
              )?.id;

            if (!IN_PROGRESS_OPTION_ID || !IN_REVIEW_OPTION_ID) {
              console.log("Status options missing");
              return;
            }

            // ✅ ALWAYS fetch open issues
            const issuesToProcess = await github.paginate(
              github.rest.issues.listForRepo,
              {
                owner: ISSUE_OWNER,
                repo: ISSUE_REPO,
                state: "open",
              }
            );

            console.log(`Issues found: ${issuesToProcess.length}`);

            for (const issue of issuesToProcess) {

              console.log(`Checking issue #${issue.number}`);

              const timeline = await github.paginate(
                github.rest.issues.listEventsForTimeline,
                {
                  owner: ISSUE_OWNER,
                  repo: ISSUE_REPO,
                  issue_number: issue.number,
                  mediaType: { previews: ["mockingbird"] }
                }
              );

              const linkedPRs = timeline
                .filter(e => e.source?.issue?.pull_request)
                .map(e => e.source.issue);

              if (linkedPRs.length === 0) continue;

              let allMerged = true;
              let anyDraft = false;

              for (const pr of linkedPRs) {
                try {
                  const result = await github.request(
                    "GET /repos/{owner}/{repo}/pulls/{pull_number}",
                    {
                      owner: pr.repository.owner.login,
                      repo: pr.repository.name,
                      pull_number: pr.number,
                    }
                  );

                  const prData = result.data;

                  if (!prData.merged) allMerged = false;
                  if (prData.draft) anyDraft = true;

                } catch {
                  allMerged = false;
                }
              }

              if (allMerged) {
                await github.rest.issues.update({
                  owner: ISSUE_OWNER,
                  repo: ISSUE_REPO,
                  issue_number: issue.number,
                  state: "closed",
                });
                console.log(`Closed issue #${issue.number}`);
                continue;
              }

              // ✅ Get project item via issue linkage
              const itemData = await github.graphql(`
                query($owner:String!, $repo:String!, $number:Int!) {
                  repository(owner:$owner, name:$repo) {
                    issue(number:$number) {
                      projectItems(first:20) {
                        nodes {
                          id
                          project { id }
                        }
                      }
                    }
                  }
                }
              `, {
                owner: ISSUE_OWNER,
                repo: ISSUE_REPO,
                number: issue.number
              });

              const projectItem = itemData.repository.issue.projectItems.nodes
                .find(p => p.project.id === PROJECT_ID);

              if (!projectItem) continue;

              const statusData = await github.graphql(`
                query($itemId: ID!) {
                  node(id: $itemId) {
                    ... on ProjectV2Item {
                      fieldValues(first: 20) {
                        nodes {
                          ... on ProjectV2ItemFieldSingleSelectValue {
                            field { ... on ProjectV2SingleSelectField { id } }
                            name
                            optionId
                          }
                        }
                      }
                    }
                  }
                }
              `, { itemId: projectItem.id });

              const currentStatusValue = statusData.node.fieldValues.nodes
                .find(v => v.field?.id === STATUS_FIELD_ID);

              const currentStatusName =
                currentStatusValue?.name?.toLowerCase() || "";

              let targetOptionId = null;

              if (anyDraft) {
                if (currentStatusName === "in review") {
                  targetOptionId = IN_PROGRESS_OPTION_ID;
                }
              } else {
                if (currentStatusName !== "in review") {
                  targetOptionId = IN_REVIEW_OPTION_ID;
                }
              }

              if (!targetOptionId) continue;
              if (currentStatusValue?.optionId === targetOptionId) continue;

              await userOctokit.graphql(`
                mutation($projectId:ID!, $itemId:ID!, $fieldId:ID!, $optionId:String!) {
                  updateProjectV2ItemFieldValue(
                    input:{
                      projectId:$projectId
                      itemId:$itemId
                      fieldId:$fieldId
                      value:{ singleSelectOptionId:$optionId }
                    }
                  ) {
                    projectV2Item { id }
                  }
                }
              `, {
                projectId: PROJECT_ID,
                itemId: projectItem.id,
                fieldId: STATUS_FIELD_ID,
                optionId: targetOptionId
              });

              console.log(`Updated status for issue #${issue.number}`);
            }
